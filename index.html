<!DOCTYPE html>
<html class="dark" lang="ms">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HPTN 2026 Sarawak - Hari Profesion Teknikal Negara</title>
    
    <!-- SEO & Social Sharing -->
    <meta name="description" content="Sertai Hari Profesion Teknikal Negara (HPTN) 2026 di Sarawak. Meraikan inovasi dan kecemerlangan profesion teknikal di Bumi Kenyalang." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hptn2026.sarawak.gov.my/" />
    <meta property="og:title" content="HPTN 2026 Sarawak - Hari Profesion Teknikal Negara" />
    <meta property="og:description" content="1-2 Disember 2026 @ BCCK Kuching. Sertai komuniti teknikal terbesar dalam meraikan inovasi dan pembangunan negara." />
    <meta property="og:image" content="https://ik.imagekit.io/z7yhsbzej/HPTN%202026%20SARAWAK%20Main%20Bottom%20Banner.png" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hptn2026.sarawak.gov.my/" />
    <meta property="twitter:title" content="HPTN 2026 Sarawak" />
    <meta property="twitter:description" content="Meraikan Kecemerlangan Profesion Teknikal di Bumi Kenyalang." />
    <meta property="twitter:image" content="https://ik.imagekit.io/z7yhsbzej/HPTN%202026%20SARAWAK%20Main%20Bottom%20Banner.png" />

    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        // Check local storage and set theme immediately to avoid flash
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#181611",
                        "background-card": "#221e10",
                        "border-dark": "#393528",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    animation: {
                        "fade-in-up": "fadeInUp 0.8s ease-out forwards",
                        "shine": "shine 12s infinite ease-in-out",
                        "scale-in": "scaleIn 0.3s ease-out forwards",
                        "robot-float": "robotFloat 6s ease-in-out infinite",
                        "btn-pulse": "buttonPulse 3s infinite ease-in-out",
                        "bounce-subtle": "bounceSubtle 2s infinite ease-in-out",
                        "robot-shine": "robotShine 4.5s infinite ease-in-out",
                        "subtle-pulse": "subtlePulse 3s infinite ease-in-out",
                        "pop": "pop 1s ease-out forwards",
                        "divider-flow": "dividerFlow 6s ease-in-out infinite",
                        "count-pulse": "countPulse 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards",
                        "cursor-blink": "cursorBlink 1s step-end infinite",
                    },
                    keyframes: {
                        fadeInUp: {
                            "0%": { opacity: "0", transform: "translateY(20px)" },
                            "100%": { opacity: "1", transform: "translateY(0)" },
                        },
                        shine: {
                            "0%, 80%": { left: "-100%", opacity: "0" },
                            "85%": { opacity: "1" },
                            "100%": { left: "100%", opacity: "0" },
                        },
                        scaleIn: {
                            "0%": { transform: "scale(0.9)", opacity: "0" },
                            "100%": { transform: "scale(1)", opacity: "1" }
                        },
                        robotFloat: {
                            "0%, 100%": { transform: "translateY(0px)" },
                            "50%": { transform: "translateY(-25px)" }
                        },
                        buttonPulse: {
                            "0%, 100%": { boxShadow: "0 0 0 0 rgba(244, 192, 37, 0)", transform: "scale(1)" },
                            "50%": { boxShadow: "0 0 20px 5px rgba(244, 192, 37, 0.4)", transform: "scale(1.03)" }
                        },
                        bounceSubtle: {
                            "0%, 100%": { transform: "translateY(0)", opacity: "0.5" },
                            "50%": { transform: "translateY(8px)", opacity: "1" }
                        },
                        robotShine: {
                            "0%": { transform: "translateX(-150%) skewX(-25deg)", opacity: "0" },
                            "30%": { opacity: "0.8" },
                            "60%": { transform: "translateX(150%) skewX(-25deg)", opacity: "0" },
                            "100%": { transform: "translateX(150%) skewX(-25deg)", opacity: "0" }
                        },
                        subtlePulse: {
                            "0%, 100%": { transform: "scale(1)", filter: "brightness(100%)" },
                            "50%": { transform: "scale(1.05)", filter: "brightness(110%)" }
                        },
                        pop: {
                            "0%": { transform: "scale(0)", opacity: "0" },
                            "50%": { opacity: "1" },
                            "100%": { transform: "scale(1.2)", opacity: "0" }
                        },
                        dividerFlow: {
                            "0%": { left: "-50%", opacity: "0" },
                            "10%": { opacity: "1" },
                            "90%": { opacity: "1" },
                            "100%": { left: "100%", opacity: "0" }
                        },
                        countPulse: {
                            "0%": { transform: "scale(0.5)", opacity: "0" },
                            "100%": { transform: "scale(1)", opacity: "1" }
                        },
                        cursorBlink: {
                            "0%, 100%": { opacity: "1" },
                            "50%": { opacity: "0" }
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: "Space Grotesk", "Noto Sans", sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        html { scroll-behavior: smooth; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #181611;
        }
        ::-webkit-scrollbar-thumb {
            background: #393528;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f4c025;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-slate-100 flex flex-col">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
